<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/flavico.png') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    {% block head %}
    {% endblock %}
    <link rel="stylesheet" href="/static/css/bootstrap.min.css" type="text/css">
    <script src = "/static/js/bootstrap.bundle.js" ></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/app.js" defer></script>
</head>
<body>
<!--Navbar-->
<nav class="navbar navbar-expand-lg py-1">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="#">
            <span class="initials fw-bold">DH</span>
            <span class="name text-white">Drabya Hamal</span>
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
            <span><i class="bi bi-list fs-1 text-white"></i></span>
        </button>

        <div class="collapse navbar-collapse justify-content-lg-end" id="mainNavbar">
            <ul class="navbar-nav gap-lg-3 text-center pt-1 pt-lg-0">
                <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('index') }}">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('about') }}">About</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('projects') }}">Projects</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="{{ url_for('contact') }}">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>
<hr class="line">

<!-- Main Content -->
{% block main %}
{% endblock %}

<!--Footer-->
<div class="footer">
<div class="container">
    <div class="row">
        <div class="col-12 py-4">
            <h6 class="text-white text-center pt-4">Your cup of tea?</h6>
            <h1 class="text-white text-center pt-2">Let's Start.</h1>
        </div>
    </div>
</div>
<div class="container">
    <div class="row align-items-center gy-3 footer-actions py-2">
        <div class="col-12 col-lg-4 text-center text-lg-start email">
            <span class="text-white"><i class="bi bi-envelope"></i> drabyahamal.2@gmail.com</span>
            <hr class="line mb-0">
        </div>
        <div class="col-12 col-lg-4 text-center download">
            <a class="btn text-dark fw-bold" href="{{ url_for('download_cv') }}">Download My CV</a>
        </div>
        <div class="col-12 col-lg-4 text-center text-lg-end contact">
            <a class="text-white" href="#"><i class="bi bi-chat-dots-fill me-2"></i>Get in touch</a>
            <hr class="line mb-0">
        </div>
    </div>
</div>
</div>
</div>
    
</body>
</html>
